<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mandelbrot Deep Zoom</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  #view { display: block; width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
  #view.dragging { cursor: grabbing; }

  .panel {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(12,12,16,0.74); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
    padding: 12px 14px; color: #e8e8ee; font-size: 12px; line-height: 1.7;
    min-width: 238px; user-select: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .panel h1 { font-size: 13px; margin: 0 0 8px; letter-spacing: .5px; font-weight: 600;
    display:flex; justify-content:space-between; align-items:center; }
  #status { font-size: 10px; font-weight: 400; }
  #status.busy { color: #ffd27a; } #status.idle { color: #6fcf86; }
  .row { display: flex; justify-content: space-between; gap: 14px; }
  .row .k { color: #8a8a99; } .row .v { color: #f0f0f6; font-variant-numeric: tabular-nums; }
  .mono { word-break: break-all; font-size: 10.5px; color:#c8c8d4; margin-top:2px; }
  .slider { margin-top: 9px; }
  .slider label { color:#8a8a99; display:block; margin-bottom:2px; }
  input[type=range] { width: 100%; accent-color: #7aa2ff; }
  .controls { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  button {
    font: inherit; font-size: 11px; color: #e8e8ee; cursor: pointer;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 6px 8px; transition: background .15s;
  }
  button:hover { background: rgba(255,255,255,0.14); }
  .hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10; color: rgba(255,255,255,0.45); font-size: 11px; pointer-events: none;
    text-align:center; }
  .toggle { position: fixed; top: 12px; left: 12px; z-index: 11; display: none;
    min-width:auto; padding:8px 10px; }
  #err { position:fixed; inset:0; display:none; place-items:center; color:#fff;
    background:#111; padding:40px; text-align:center; z-index:50; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="err"></div>

<div class="panel" id="panel">
  <h1>● MANDELBROT <span id="status" class="idle">ready</span></h1>
  <div class="row"><span class="k">zoom</span><span class="v" id="i-zoom">1×</span></div>
  <div class="row"><span class="k">iterations</span><span class="v" id="i-iter">256</span></div>
  <div class="row"><span class="k">precision</span><span class="v" id="i-prec">53 bit</span></div>
  <div class="row"><span class="k">render</span><span class="v" id="i-fps">–</span></div>
  <div class="row"><span class="k">center re</span></div>
  <div class="mono" id="i-re">-0.5</div>
  <div class="row"><span class="k">center im</span></div>
  <div class="mono" id="i-im">0.0</div>

  <div class="slider">
    <label>iterations <span id="i-iterauto">(auto)</span></label>
    <input type="range" id="iterSlider" min="128" max="100000" step="128" value="256">
  </div>
  <div class="slider">
    <label>color shift</label>
    <input type="range" id="colorSlider" min="0" max="100" step="1" value="0">
  </div>
  <div class="slider">
    <label>color density</label>
    <input type="range" id="densitySlider" min="1" max="120" step="1" value="28">
  </div>
  <div class="slider">
    <label>palette</label>
    <input type="range" id="paletteSlider" min="0" max="4" step="1" value="1">
  </div>
  <div class="controls">
    <button id="btnReset">⟲ Reset</button>
    <button id="btnAuto">⚙ Auto iter: on</button>
    <button id="btnSave">⬇ Save PNG</button>
    <button id="btnHide">✕ Hide UI</button>
  </div>
</div>
<button class="toggle panel" id="btnShow">☰</button>

<div class="hint">scroll / pinch to zoom · drag to pan · double-click zoom in · shift+double-click zoom out</div>

<script>
'use strict';
const canvas = document.getElementById('view');
const gl = canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true });
if (!gl){
  const e = document.getElementById('err');
  e.style.display = 'grid';
  e.textContent = 'WebGL2 is required for the deep-zoom renderer but is not available in this browser.';
  throw new Error('no webgl2');
}

// ---------- shaders ----------
const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `#version 300 es
precision highp float;
precision highp int;
precision highp sampler2D;

uniform sampler2D u_orbit;   // RG = reference orbit Zx,Zy
uniform int   u_orbitW;
uniform int   u_orbitLen;
uniform int   u_maxIter;
uniform vec2  u_res;
uniform float u_step;        // complex units per pixel
uniform float u_escape;
uniform float u_density;
uniform float u_colorOffset;
uniform int   u_palette;
out vec4 frag;

vec2 getZ(int m){
  return texelFetch(u_orbit, ivec2(m % u_orbitW, m / u_orbitW), 0).xy;
}

vec3 palette(float t){
  const float TAU = 6.28318530718;
  if (u_palette == 0) return 0.5 + 0.5*cos(TAU*(vec3(0.00,0.10,0.20)+t));
  if (u_palette == 1) return 0.5 + 0.5*cos(TAU*(vec3(0.00,0.33,0.67)+t));
  if (u_palette == 2) return 0.5 + 0.5*cos(TAU*(vec3(0.30,0.20,0.10)+t*0.7));
  if (u_palette == 3){ float v = 0.5+0.5*sin(TAU*t); return vec3(0.4*v,0.7*v,v); }
  return 0.5 + 0.5*cos(TAU*(vec3(0.80,0.50,0.20)+t));
}

void main(){
  vec2 px = gl_FragCoord.xy - 0.5*u_res;       // y is up
  float dcx = px.x * u_step;
  float dcy = px.y * u_step;

  float ex = 0.0, ey = 0.0;   // delta_z
  int m = 0;
  int iter = 0;
  float mag = 0.0;
  bool escaped = false;
  int Lm1 = u_orbitLen - 1;

  for (int i = 0; i < 200000; i++){
    if (iter >= u_maxIter) break;
    vec2 Z = getZ(m);
    float ex2 = ex*ex, ey2 = ey*ey;
    float tx = 2.0*(Z.x*ex - Z.y*ey) + (ex2 - ey2) + dcx;
    float ty = 2.0*(Z.x*ey + Z.y*ex) + (2.0*ex*ey) + dcy;
    ex = tx; ey = ty;
    m++; iter++;
    vec2 Zm = getZ(m);
    float zx = Zm.x + ex, zy = Zm.y + ey;
    mag = zx*zx + zy*zy;
    if (mag > u_escape){ escaped = true; break; }
    float emag = ex*ex + ey*ey;
    if (mag < emag || m >= Lm1){ ex = zx; ey = zy; m = 0; }
  }

  if (!escaped){
    frag = vec4(0.0, 0.0, 0.0, 1.0);
  } else {
    float log_zn = log(mag) * 0.5;
    float nu = log(log_zn / 0.6931472) / 0.6931472;
    float sm = (float(iter) - nu) / u_density + u_colorOffset;
    frag = vec4(palette(sm), 1.0);
  }
}`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = n => gl.getUniformLocation(prog, n);
const uni = { orbit:U('u_orbit'), orbitW:U('u_orbitW'), orbitLen:U('u_orbitLen'),
  maxIter:U('u_maxIter'), res:U('u_res'), step:U('u_step'), escape:U('u_escape'),
  density:U('u_density'), colorOffset:U('u_colorOffset'), palette:U('u_palette') };

const orbitTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, orbitTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.uniform1i(uni.orbit, 0);
const ORBIT_W = 1024;

// ---------- view state ----------
const INIT_RE = -0.5, INIT_IM = 0.0, INIT_VIEW_W = 3.5;
let viewWidth = INIT_VIEW_W;
let storedP = 0;
let cxFix = 0n, cyFix = 0n;
let maxIter = 256, autoIter = true;
let colorOffset = 0, density = 28, paletteIdx = 1;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let deviceW = 0, deviceH = 0;
const ESCAPE = 1e8;

// ---------- arbitrary-precision helpers ----------
function doubleToFix(x, P){
  if (x === 0) return 0n;
  const neg = x < 0; x = Math.abs(x);
  const e = Math.floor(Math.log2(x));
  const mant = Math.round((x / Math.pow(2, e)) * Math.pow(2, 52));
  const shift = e - 52 + P;
  let b = BigInt(mant);
  b = shift >= 0 ? (b << BigInt(shift)) : (b >> BigInt(-shift));
  return neg ? -b : b;
}
function fixToDouble(b, P){
  if (b === 0n) return 0;
  const neg = b < 0n; let v = neg ? -b : b;
  const bits = v.toString(2).length;
  const sh = bits > 60 ? bits - 60 : 0;
  const d = Number(v >> BigInt(sh)) * Math.pow(2, sh - P);
  return neg ? -d : d;
}
function fixToString(b, P, digits){
  const neg = b < 0n; let v = neg ? -b : b;
  const scale = 10n ** BigInt(digits);
  const intPart = v >> BigInt(P);
  const frac = v - (intPart << BigInt(P));
  const fracDec = (frac * scale) >> BigInt(P);
  const fs = fracDec.toString().padStart(digits, '0');
  return (neg ? '-' : '') + intPart.toString() + '.' + fs;
}
function ensurePrecision(needP){
  if (needP > storedP){
    const sh = BigInt(needP - storedP);
    cxFix <<= sh; cyFix <<= sh; storedP = needP;
  }
}
function precisionForView(){ return Math.max(40, Math.ceil(-Math.log2(viewWidth)) + 100); }
function offsetCenter(odx, ody){
  cxFix += doubleToFix(odx, storedP);
  cyFix += doubleToFix(ody, storedP);
}

// ---------- reference orbit (arbitrary precision) ----------
function computeReference(){
  const P = BigInt(storedP);
  const thresh = 4n << P;
  let zx = 0n, zy = 0n;
  const cap = maxIter + 1;
  let L = 0;
  const H = Math.ceil(cap / ORBIT_W);
  const data = new Float32Array(ORBIT_W * H * 4);
  for (let n = 0; n < cap; n++){
    data[n*4]   = fixToDouble(zx, storedP);
    data[n*4+1] = fixToDouble(zy, storedP);
    L = n + 1;
    const zx2 = (zx*zx) >> P, zy2 = (zy*zy) >> P;
    if (zx2 + zy2 > thresh) break;
    const xy = (zx*zy) >> P;
    zx = zx2 - zy2 + cxFix;
    zy = (xy << 1n) + cyFix;
  }
  return { data, L, H };
}

// ---------- render ----------
let rafPending = false, dirty = false;
function scheduleRender(){
  dirty = true;
  if (!rafPending){ rafPending = true; requestAnimationFrame(frame); }
}
function frame(){
  rafPending = false;
  if (!dirty) return;
  dirty = false;
  if (autoIter) maxIter = computeAutoIter();
  ensurePrecision(precisionForView());
  setStatus(true);
  const t0 = performance.now();

  const { data, L, H } = computeReference();
  gl.bindTexture(gl.TEXTURE_2D, orbitTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, ORBIT_W, H, 0, gl.RGBA, gl.FLOAT, data);

  gl.uniform1i(uni.orbitW, ORBIT_W);
  gl.uniform1i(uni.orbitLen, L);
  gl.uniform1i(uni.maxIter, maxIter);
  gl.uniform2f(uni.res, deviceW, deviceH);
  gl.uniform1f(uni.step, viewWidth / deviceW);
  gl.uniform1f(uni.escape, ESCAPE);
  gl.uniform1f(uni.density, density);
  gl.uniform1f(uni.colorOffset, colorOffset);
  gl.uniform1i(uni.palette, paletteIdx);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.finish();

  const dt = performance.now() - t0;
  el('i-fps').textContent = dt.toFixed(0) + ' ms';
  setStatus(false);
  updateUI();
}
function computeAutoIter(){
  const zoom = INIT_VIEW_W / viewWidth;
  const it = Math.round(256 + 130 * Math.max(0, Math.log2(zoom)));
  return Math.max(128, Math.min(12000, it));
}

// ---------- UI ----------
const el = id => document.getElementById(id);
function setStatus(busy){
  const s = el('status');
  s.textContent = busy ? 'rendering…' : 'ready';
  s.className = busy ? 'busy' : 'idle';
}
function updateUI(){
  const zoom = INIT_VIEW_W / viewWidth;
  el('i-zoom').textContent = zoom < 1e4 ? zoom.toFixed(1)+'×'
    : zoom.toExponential(2).replace('e+', '×10^');
  el('i-iter').textContent = maxIter;
  el('i-prec').textContent = storedP + ' bit';
  const digits = Math.min(120, Math.max(4, Math.ceil(-Math.log10(viewWidth)) + 4));
  el('i-re').textContent = fixToString(cxFix, storedP, digits);
  el('i-im').textContent = fixToString(cyFix, storedP, digits);
  const sl = el('iterSlider');
  if (+sl.value !== maxIter && maxIter <= +sl.max) sl.value = maxIter;
}

function zoomAt(cssX, cssY, factor){
  const px = (cssX * dpr - deviceW * 0.5);
  const py = (deviceH * 0.5 - cssY * dpr);   // y up
  const oldStep = viewWidth / deviceW;
  viewWidth *= factor;
  const newStep = viewWidth / deviceW;
  offsetCenter(px * (oldStep - newStep), py * (oldStep - newStep));
  scheduleRender();
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, Math.pow(1.0016, e.deltaY));
}, { passive: false });

let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging'); canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const step = viewWidth / deviceW;
  offsetCenter(-(e.clientX - lastX) * dpr * step, (e.clientY - lastY) * dpr * step);
  lastX = e.clientX; lastY = e.clientY;
  scheduleRender();
});
function endDrag(){ dragging = false; canvas.classList.remove('dragging'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);
canvas.addEventListener('dblclick', e => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.shiftKey ? 2.5 : 0.4);
});

let pinch = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2){
    const [a,b] = e.touches;
    pinch = { d: Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY),
              x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 };
  }
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinch){
    e.preventDefault();
    const [a,b] = e.touches;
    const d = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    zoomAt(pinch.x, pinch.y, pinch.d / d); pinch.d = d;
  }
}, { passive:false });
canvas.addEventListener('touchend', () => { pinch = null; });

el('iterSlider').addEventListener('input', e => {
  autoIter = false; el('btnAuto').textContent = '⚙ Auto iter: off';
  el('i-iterauto').textContent = '(manual)';
  maxIter = parseInt(e.target.value); scheduleRender();
});
el('colorSlider').addEventListener('input', e => { colorOffset = e.target.value/100; scheduleRender(); });
el('densitySlider').addEventListener('input', e => { density = parseInt(e.target.value); scheduleRender(); });
el('paletteSlider').addEventListener('input', e => { paletteIdx = parseInt(e.target.value); scheduleRender(); });

el('btnReset').addEventListener('click', () => {
  viewWidth = INIT_VIEW_W; storedP = precisionForView();
  cxFix = doubleToFix(INIT_RE, storedP); cyFix = doubleToFix(INIT_IM, storedP);
  autoIter = true; el('btnAuto').textContent = '⚙ Auto iter: on';
  el('i-iterauto').textContent = '(auto)';
  scheduleRender();
});
el('btnAuto').addEventListener('click', () => {
  autoIter = !autoIter;
  el('btnAuto').textContent = '⚙ Auto iter: ' + (autoIter ? 'on' : 'off');
  el('i-iterauto').textContent = autoIter ? '(auto)' : '(manual)';
  scheduleRender();
});
el('btnSave').addEventListener('click', () => {
  scheduleRender();
  requestAnimationFrame(() => {
    const a = document.createElement('a');
    a.download = 'mandelbrot_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png'); a.click();
  });
});
el('btnHide').addEventListener('click', () => {
  el('panel').style.display = 'none'; el('btnShow').style.display = 'block';
});
el('btnShow').addEventListener('click', () => {
  el('panel').style.display = 'block'; el('btnShow').style.display = 'none';
});
window.addEventListener('keydown', e => {
  const stepPx = 80, step = viewWidth / deviceW;
  if (e.key === '+' || e.key === '=') zoomAt(innerWidth/2, innerHeight/2, 0.6);
  else if (e.key === '-' || e.key === '_') zoomAt(innerWidth/2, innerHeight/2, 1/0.6);
  else if (e.key === 'ArrowLeft'){ offsetCenter(-stepPx*dpr*step, 0); scheduleRender(); }
  else if (e.key === 'ArrowRight'){ offsetCenter(stepPx*dpr*step, 0); scheduleRender(); }
  else if (e.key === 'ArrowUp'){ offsetCenter(0, stepPx*dpr*step); scheduleRender(); }
  else if (e.key === 'ArrowDown'){ offsetCenter(0, -stepPx*dpr*step); scheduleRender(); }
  else if (e.key === 'r' || e.key === 'R') el('btnReset').click();
});

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  deviceW = Math.max(1, Math.floor(window.innerWidth * dpr));
  deviceH = Math.max(1, Math.floor(window.innerHeight * dpr));
  canvas.width = deviceW; canvas.height = deviceH;
  gl.viewport(0, 0, deviceW, deviceH);
  scheduleRender();
}
window.addEventListener('resize', resize);

// init
storedP = precisionForView();
cxFix = doubleToFix(INIT_RE, storedP);
cyFix = doubleToFix(INIT_IM, storedP);
resize();
</script>
</body>
</html>
